# Build web-search MCP server for Cloud Run.
# Run from repo root: gcloud builds submit --config=deploy/cloudbuild.web-search-mcp.yaml
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'deploy/Dockerfile.web-search-mcp'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/web-search-mcp:$BUILD_ID'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/web-search-mcp:latest'
      - '.'
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/web-search-mcp:$BUILD_ID'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/web-search-mcp:latest'
options:
  logging: CLOUD_LOGGING_ONLY
