# Build google-workspace-mcp for Cloud Run.
# Uses the official image from aaronsb/google-workspace-mcp.
# Run from repo root: gcloud builds submit --config=deploy/cloudbuild.google-workspace-mcp.yaml
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'deploy/Dockerfile.google-workspace-mcp'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/google-workspace-mcp:$BUILD_ID'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/google-workspace-mcp:latest'
      - '.'
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/google-workspace-mcp:$BUILD_ID'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/google-workspace-mcp:latest'
options:
  logging: CLOUD_LOGGING_ONLY
